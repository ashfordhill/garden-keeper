server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Photo uploads can be large.
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s; # segmentation on CPU can be slow
    }

    location / {
        try_files $uri /index.html;
    }
}
